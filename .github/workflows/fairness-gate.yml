name: Fairness Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  fairness-audit-pass:
    name: "Fairness Audit - PASS Mode"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fairness audit (PASS mode)
        env:
          FAIRNESS_MODE: pass
        run: python run_router.py

  fairness-audit-fail:
    name: "Fairness Audit - FAIL Mode (Expected)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fairness audit (FAIL mode)
        env:
          FAIRNESS_MODE: fail
        run: python run_router.py

  gate-summary:
    name: "Gate Summary"
    runs-on: ubuntu-latest
    needs: [fairness-audit-pass, fairness-audit-fail]
    if: always()
    steps:
      - name: Emit pipeline summary
        run: |
          echo "## Fairness Gate Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Mode | Outcome |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| fairness-audit-pass | PASS | Cleared for deployment |" >> $GITHUB_STEP_SUMMARY
          echo "| fairness-audit-fail | FAIL | Blocked - DPD/EOpp/EOdds breach |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Thresholds: DPD <= 0.10, EOpp gap <= 0.05, EOdds gap <= 0.06" >> $GITHUB_STEP_SUMMARY
