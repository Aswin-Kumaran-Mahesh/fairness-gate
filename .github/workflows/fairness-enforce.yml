name: Fairness Gate

on:
  workflow_dispatch:

jobs:
  fairness-audit-enforce:
    name: "Fairness Audit - Enforcement (Model Blocked)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fairness audit (threshold breach)
        env:
          FAIRNESS_MODE: fail
          MODEL_TYPE: tabular
        run: python run_router.py
